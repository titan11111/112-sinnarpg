<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem Quest - Retro Action RPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="mobileControls">
    <div class="dpad">
      <div class="dpad-btn" id="btn-up">▲</div>
      <div class="dpad-btn" id="btn-down">▼</div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-btn" id="btn-right">▶</div>
    </div>
    <div class="action-btns">
      <div class="action-btn" id="btn-attack">ATK</div>
      <div class="action-btn" id="btn-skill">SKL</div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
